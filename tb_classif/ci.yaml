name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Install Verible
        run: |
          wget https://github.com/chipsalliance/verible/releases/download/v0.0-3428-gcfcbb82b/verible-v0.0-3428-gcfcbb82b-linux-static-x86_64.tar.gz
          tar -xzf verible-*.tar.gz
          echo "$PWD/verible-v0.0-3428-gcfcbb82b/bin" >> $GITHUB_PATH
      
      - name: Install GHDL
        run: |
          sudo apt-get update
          sudo apt-get install -y ghdl
      
      - name: Lint with flake8
        run: |
          flake8 step2_classify_route --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Type check with mypy
        run: |
          mypy step2_classify_route --ignore-missing-imports
      
      - name: Test with pytest
        run: |
          pytest tests/ -v --cov=step2_classify_route --cov-report=xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install black isort
      
      - name: Check formatting with black
        run: black --check step2_classify_route tests
      
      - name: Check imports with isort
        run: isort --check-only step2_classify_route tests
